
<h2>System-Eligible Audio Object Limit</h2>
<p>플러그인이 출력 가능한 System Audio Object의 최대 개수입니다. 이 한도를 초과하는 사용 가능한 모든 System Audio Object는 믹스됩니다.</p>
<p><strong>참고</strong>: System Audio Object가 Preserve System-Eligible Audio Object 속성에 따라 유지되는 경우에만 이 한도가 적용됩니다.</p>
<p>Default value: 64<br/>
Range: 0 to 512<br/></p>
