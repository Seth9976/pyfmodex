
<h2>Decorrelation Mode</h2>
<p><a href="HelpDoc=glossary#glossary_decorrelation_filter">無相関フィルタ</a> の位相ずれ軽減のモードを次のいずれかに設定する。</p>
<ul>
<li><strong>Favor Performance</strong>:メモリとCPUの消費量は小さいが、出力信号にカラーレーションが生じる。</li>
<li><strong>Favor Quality</strong>:メモリとCPUの消費量は大きいが、カラーレーションを抑えられる。</li>
</ul>
<p>Default value: Favor Performance<br/></p>
