
<h2>Image Source Fade Time</h2>
<p>新しいイメージソースが追加されるとディレイタップにフェードイン（ミリ秒単位）を適用し、イメージソースが削除されるとフェードアウトを適用する。</p>
<p>トランジェントを保持するため、Reflectの初期化時はフェードインが適用されない。フェードインは、Reflectプラグインがオーディオの処理を開始した後にイメージソースが追加された場合にのみ適用される。</p>
<p>クリックを防ぐため、1オーディオバッファ以上のフェードアウトタイムが常に適用される。</p>
<p>Default value: 500<br/>
Range: 0 to 10000<br/></p>
