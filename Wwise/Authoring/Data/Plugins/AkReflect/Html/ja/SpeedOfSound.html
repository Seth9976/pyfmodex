
<h2>Speed Of Sound</h2>
<p>単位毎秒。単位とは、ゲームで使用してReflectに送信される、距離の単位を指す。空中の音速は、～秒速340m（単位m/s）。ゲームの単位がcmであれば、秒速は約34,000(cm)/sとなる。イメージソースのディレイタイムは、距離を音速で割って計算できる。</p>
<p>注：音速値が小さいか、イメージソースの距離値が大きいと、ディレイタイムが長くなり、メモリ使用量が大きくなる。メモリ使用量が大きいとCPUスパイクが発生する可能性がある。</p>
<p>Default value: 345<br/>
Range: 0.001 to 2147483648<br/></p>
