
<h2>Widen Stereo Field</h2>
<p>有効にすると、ステレオイメージフィールドの幅を広げるために <a href="HelpDoc=glossary#glossary_decorrelation_filter">無相関フィルタ</a> が使用される。幅が広がる量はDecorrelation Strengthによって決まる。この機能を有効にするには、Distance SpreadカーブでSpreadを0より大きい値に設定する必要がある。</p>
<p>このオプションを有効にすると、ReflectがメモリとCPUを多く消費するため注意が必要である。</p>
<p>Default value: false<br/></p>
