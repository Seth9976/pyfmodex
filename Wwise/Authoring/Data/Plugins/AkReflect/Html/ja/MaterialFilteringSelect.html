
<h2>Material Filtering</h2>
<p>マテリアルフィルタリングのモードを次のいずれかに設定する:</p>
<ul>
<li><strong>Favor Performance</strong>:大部分のマテリアルの音響特性をシェルフフィルタによって概算することでCPU使用を4分の1に抑える。Favor Performanceを使用すると、2つの個別の中間帯域の吸音ではなく、合わせてミッドゲインを指定する。<a href="HelpDoc=acoustic_textures">Acoustic Textures</a> を参照。</li>
<li><strong>Favor Quality</strong>:マテリアルの音響特性を詳細で正確な4つの帯域のフィルタでリアルにモデル化する。</li>
</ul>
