
<h2>Direct Sound Max Delay</h2>
<p>イメージソースのリフレクション（反射）が直接音と融合する場合のイメージソースのディレイ（ミリ秒）。これにより、例えばエミッターとリスナーが両方サーフェスの近くにある時に発生するような、リフレクションと直接音の間で発生する位相ずれアーティファクトを抑制できる。</p>
<p>通常は、デフォルト値の20ミリ秒にすることで直接パスへの可聴干渉のほとんどを除去できる。ただし、最適な値はサウンドの周波数成分によって異なる。</p>
<p>Default value: 20<br/>
Range: 0 to 1000<br/></p>
