
<h2>Direct Sound Max Delay</h2>
<p>허음원의 딜레이(ms)가 이 값보다 짧으면 해당 반사음은 직접음(direct sound)과 하나로 합쳐집니다. 이는 이미터와 리스너가 모두 표면 근처에 있을 때 발생할 수 있는 반사음과 직접음 간의 페이징 효과를 억제합니다.</p>
<p>기본값인 20 ms 정도면 직접 경로와의 청각적 간섭을 대부분 제거합니다. 하지만 최적의 값은 사운드의 주파수 구성에 따라 달라집니다.</p>
<p>Default value: 20<br/>
Range: 0 to 1000<br/></p>
