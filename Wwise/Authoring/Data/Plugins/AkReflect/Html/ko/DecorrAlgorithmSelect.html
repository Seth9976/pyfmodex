
<h2>Decorrelation Mode</h2>
<p><a href="HelpDoc=glossary#glossary_decorrelation_filter">비상관화 필터</a> 의 페이징 완화 방식을 다음으로 설정합니다:</p>
<ul>
<li><strong>Favor Performance</strong>: 성능을 우선시하여 메모리와 CPU 사용량이 적지만 출력 신호에 불필요한 음색 변화(coloration)가 생길 수 있습니다.</li>
<li><strong>Favor Quality</strong>: 메모리와 CPU 사용량이 더 많지만 음색 변화가 적게 발생합니다.</li>
</ul>
<p>Default value: Favor Performance<br/></p>
