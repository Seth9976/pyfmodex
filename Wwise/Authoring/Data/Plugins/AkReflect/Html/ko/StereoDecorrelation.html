
<h2>Widen Stereo Field</h2>
<p>이 옵션을 활성화하면 <a href="HelpDoc=glossary#glossary_decorrelation_filter">비상관화 필터</a> 를 사용해 스테레오 이미지 필드를 확장합니다. 확장되는 정도는 Decorrelation Strength 값에 따라 달라집니다. 이 기능을 활성화하려면 Distance Spread 곡선에서 Spread 값을 0보다 크게 설정해야 합니다.</p>
<p>참고: 이 옵션을 활성화하면 Reflect는 더 많은 메모리와 CPU를 사용합니다.</p>
<p>Default value: false<br/></p>
