
<h2>Image Source Fade Time</h2>
<p>새로운 허음원이 추가되면 해당 딜레이 탭에 페이드 인(밀리초 단위)을 적용하고, 허음원이 제거될 때 페이드 아웃을 적용합니다.</p>
<p>트랜션트(transient)를 유지하기 위해 Reflect가 초기화될 때는 페이드 인이 적용되지 않습니다. 페이드 인은 Reflect 플러그인이 오디오 처리를 시작한 이후에 허음원이 추가될 때만 적용됩니다.</p>
<p>클릭음을 방지하기 위해 최소 1 오디오 버퍼만큼의 페이드 아웃 시간이 항상 적용됩니다.</p>
<p>Default value: 500<br/>
Range: 0 to 10000<br/></p>
