
<h2>Material Filtering</h2>
<p>소재 필터링 모드를 다음 중 하나로 설정합니다:</p>
<ul>
<li><strong>Favor Performance</strong>: 대부분의 소재의 음향 특성을 셸프 필터(shelf filter)로 단순화해 표현하여 CPU 사용량을 4분의 1로 줄입니다. Favor Performance 모드에서는 두 중역대 흡수가 별도로 작동하지 않으며, 대신 하나로 결합되어 중역 게인을 형성합니다.  <a href="HelpDoc=acoustic_textures">음향 재질</a> 을 참고하세요.</li>
<li><strong>Favor Quality</strong>: 소재의 음향 특성을 사실적으로 모델링하여 정밀한 4밴드 필터를 사용해 정확하게 구현합니다.</li>
</ul>
