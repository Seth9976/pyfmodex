
<h2>Decorrelation Mode</h2>
<p>去相关模式。将 <a href="HelpDoc=glossary#glossary_decorrelation_filter">去相关滤波器</a> 的相位偏移设为以下任一模式：</p>
<ul>
<li><strong>Favor Performance</strong>:占用较少内存和 CPU 资源，但会对输出信号进行修饰。</li>
<li><strong>Favor Quality</strong>:占用较多内存和 CPU 资源，但实施的修饰相对少一些。</li>
</ul>
<p>Default value: Favor Performance<br/></p>
