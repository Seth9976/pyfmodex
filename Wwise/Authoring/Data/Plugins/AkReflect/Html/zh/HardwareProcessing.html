
<h2>Use Hardware Processing</h2>
<p>使用硬件处理。仅适用于选定平台。此属性允许运用硬件加速来对镜像声源进行处理。在启用时，硬件加速可降低 Reflect 的 CPU 用量。</p>
<?div platform="PS5" open="1"?>
<p><span class="condition" name="PlatformSpecific">在 PS5 上启用时有以下限制：
- 须通过 Max Image Source Delay Time 属性明确指定镜像声源的最大延迟时间。系统不会对延迟大于该值的镜像声源实施渲染。
- 不可将 Speed of Sound 用作 RTPC。
- 仅在 Favor Performance 模式下对材料滤波实施渲染。
</span><?div platform="PS5" open="0"?></p>
