
<h2>Material Filtering</h2>
<p>设置材料滤波模式：</p>
<ul>
<li><strong>Favor Performance</strong>:通过低架/高架滤波器模拟大部分材料的声学属性（可将 CPU 用量降低四倍）。在使用 Favor Performance 时，中低和中高频段的吸收并不是独立的，而是会共同形成中频增益。参见 <a href="HelpDoc=acoustic_textures">Acoustic Textures</a> 页面。</li>
<li><strong>Favor Quality</strong>:通过精细的四频段滤波器逼真地模拟材料的声学属性。</li>
</ul>
