
<h2>Pitch Limit</h2>
<p>音高限值。设置最多允许存在多少音分的多普勒变调。变调是由延迟时间的变化引起的。因此，延迟变化速率被限定在指定的 Pitch Limit 以内。在降低此速率以与限值协调一致时，有效延迟和期望延迟之间可能会出现差异。此差异可通过 <strong>Delay Error Tolerance</strong> 属性来控制。</p>
<p>在反射时长/延迟不断变化时，将不会更新此值。此参数可由 RTPC 和 State 控制；不过，建议在游戏当中不要更新 RTPC 或 State。虽然可以进行实时更新，但在处理过程中有可能会产生杂音。</p>
<p>Default value: 300<br/>
Range: 0 to 9600<br/></p>
