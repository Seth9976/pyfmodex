
<h2>Decorrelation Strength</h2>
<p>Sets the aggressiveness of the <a href="HelpDoc=glossary#glossary_decorrelation_filter">decorrelation filter&rsquo;s</a> phasing mitigation. As the strength increases, phasing decreases. However, greater strengths are more likely to add coloration to the output signal.</p>
<p>Default value: 0.0<br/>
Range: 0 to 100.0<br/></p>
