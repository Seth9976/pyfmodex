
<h2>Allow 3D Audio</h2>
<p>이 옵션을 선택하면, Audio Device가 엔드포인트의 3D 오디오 기능 활성화를 시도할 수 있는 권한을 부여합니다. 이 옵션을 해제하면 모든 3D 오디오 기능을 사용하지 않도록 설정됩니다.</p>
<p><strong>참고</strong>: 이 옵션을 선택하더라도 3D 오디오가 반드시 활성화되는 것은 아닙니다. 3D 오디오는 해당 플랫폼이 이 기능을 지원할 경우에만 활성화됩니다.</p>
<p>자세한 내용은 <a href="HelpDoc=object_based_audio_overview">오브젝트 기반 오디오 이해하기</a> 를 참고하세요.</p>
<p>Default value: false<br/></p>
