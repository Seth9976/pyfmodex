
<h2>HPF</h2>
<p>When &ldquo;Enable HPF&rdquo; is set, a high-pass filter at this frequency is performed on the signal sent to the Sidechain Mix, reducing the volume of any audio lower than this frequency.</p>
<p>单位：Hz<br/></p>
<p>Default value: 20<br/>
Range: 20 to 20000<br/>
Units: Frequency<br/></p>
