
<h2>Mode</h2>
<p>The metering mode. This plug-in can be set to track either peak values or RMS.</p>
<ul>
<li><strong>Peak</strong>: Sets the meter to Peak mode, which is more reactive to transients.</li>
<li><strong>RMS</strong>: Sets the meter to RMS mode, which is generally better for voice work.</li>
</ul>
<p>Default value: RMS<br/></p>
