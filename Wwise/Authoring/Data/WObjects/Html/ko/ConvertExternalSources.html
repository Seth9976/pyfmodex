
<h2>Convert external sources when generating banks</h2>
<p>이 옵션이 활성화되면 <a href="HelpDoc=wwise_external_source_plug_in_overview">외장 음원</a> 오디오 파일은 SoundBank 생성 과정의 일부로 WEM 형식으로 변환됩니다. 사운드 엔진이 해당 파일을 런타임에서 사용하려면 WEM 형식이어야 합니다. 그러나 파일을 로컬에서 사용하지 않는 경우, 이 옵션을 비활성화해서 SoundBank 생성 속도를 높일 수 있습니다.</p>
<p>Default value: true<br/></p>
