
<h2>Pan Up-Down</h2>
<p>원의 Z축 좌표를 말합니다. (높이 레이어에 채널이 없는 구성에는 영향을 미치지 않습니다.)</p>
<p><strong>참고</strong>: Z 축 슬라이더는 Speaker Panning 모드가 Steering으로 설정되어 있거나, Balance-Fade로 설정되고 7.1.4 사운드 또는 버스가 7.1.4 버스로 라우팅될 때만 사용할 수 있습니다.</p>
<p><strong>참고</strong>: Z 축은 그래프 뷰에서 표시되지 않습니다. 이 값은 오직 Z 축 슬라이더에 의해 제어되고 표시됩니다.</p>
<p>Default value: 0<br/>
Range: -100 to 100<br/></p>
