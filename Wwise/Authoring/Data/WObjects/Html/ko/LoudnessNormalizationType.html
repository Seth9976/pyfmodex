
<h2>Loudness Normalization Type</h2>
<p>노멀라이제이션을 위한 라우드니스 측정 유형을 정의합니다.</p>
<ul>
<li>Integrated (기본값): 대체로 ITU-R BS 1770 표준을 따릅니다.</li>
<li>Momentary Max: 매우 짧은 (100ms) 측정 간격으로 얻어진 가장 높은 음량 값입니다.</li>
</ul>
<p>Loudness Normalization에 대한 더 자세한 정보는 <a href="HelpDoc=using_loudness_normalization_or_make_up_gain_to_adjust_volume">라우드니스 노멀라이제이션이나 보충 게인을 사용하여 볼륨 조종하기</a> 를 참고하세요.</p>
<p>Default value: Integrated<br/></p>
