
<h2>Key Range Max</h2>
<p>전달 받은 MIDI 노트 이벤트의 음에 적용되는 필터를 말합니다. 전달 받은 MIDI 노트 Event는 해당 음이 Min-Max(최소-최대) 범위에 있지 않을 경우 무시됩니다.</p>
<p>기본 최소값: C-1 기본 최대값: G9</p>
<p><strong>참고</strong>: 숫자 MIDI 노트와 옥타브 간의 매핑은 사용자 기본 설정을 통해 지정됩니다. 더 자세한 내용은 <a href="HelpDoc=user_preferences">사용자 기본 설정</a> 을 참고하세요.</p>
<p>Default value: 127<br/>
Range: 0 to 127<br/></p>
