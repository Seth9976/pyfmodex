
<h2>Hold Emitter Position and Orientation</h2>
<p>이 옵션을 활성화하면 사운드가 재생을 시작할 때 게임 오브젝트의 즉각적인 위치와 방향을 저장하고 사운드의 전체 길이 동안 이에 따라 위치를 지정합니다.</p>
<p><strong>참고</strong>: Wwise Spatial Audio 기능은 <strong>Hold Emitter Position and Orientation</strong>을 활성화한 사운드에서는 비활성화됩니다. 여기에는 초기 반사음 처리, Distance Probe, 회절 및 전달, 그리고 Room 센드가 포함됩니다.</p>
<p>Default value: false<br/></p>
