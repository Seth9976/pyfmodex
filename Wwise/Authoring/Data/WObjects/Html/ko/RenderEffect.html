
<h2>Render</h2>
<p>선택된 Effect 인스턴스가 SoundBank에 패키징되기 전에 렌더링될 것인가를 정합니다.</p>
<p>Effect를 SoundBank에 패키징하기 전에 렌더링하는 것은 게임플레이 도중 처리 능력을 향상시킬 수 있습니다. However, it also limits the interactivity with game play because an Effect cannot be rendered when Game Syncs control its parameters.</p>
<p>Default value: false<br/></p>
