
<h2>User Auxiliary Send HPF</h2>
<p>User Auxiliary Send (User-Defined Auxiliary Send 0 - 3)를 통해 Auxiliary Bus로 전송되는 신호에 적용되는 High-Pass Filter를 말합니다.</p>
<p>자세한 내용은 <a href="HelpDoc=associating_low_pass_filter_values_with_their_corresponding_cutoff_frequencies#wwise_lpf_value_cutoff_frequencies">Wwise LPF 및 HPF 값 차단 주파수</a> 를 참고하세요.</p>
<p>Default value: 0<br/>
Range: 0 to 100<br/></p>
