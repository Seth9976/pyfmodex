
<h2>Loudness Normalization Target</h2>
<p>노멀라이제이션 목표 음량 LUFS 값 입니다.</p>
<p>Loudness Normalization에 대한 더 자세한 정보는 <a href="HelpDoc=using_loudness_normalization_or_make_up_gain_to_adjust_volume">라우드니스 노멀라이제이션이나 보충 게인을 사용하여 볼륨 조종하기</a> 를 참고하세요.</p>
<p>Default value: -23<br/>
Range: -96 to 0<br/>
Units: dB<br/></p>
