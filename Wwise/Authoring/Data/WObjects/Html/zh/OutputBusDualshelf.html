
<h2>Dual-shelf Filter (to Output Bus)</h2>
<p>双通道搁架滤波器(到输出总线)。此双通道搁架滤波器用于输出到音频输出总线的信号。</p>
<p>声部低通滤波器。基于指定增益值针对高频进行衰减或增强的递归滤波器。</p>
<p><strong>备注</strong>:默认滑杆范围从 -96 至 +12 dB。您可以通过直接输入值或在编辑控件上移动鼠标来输入超出限制范围的值。</p>
<p>单位：dB<br/></p>
<p>Default value: 0<br/>
Range: -200 to 200<br/>
Units: dB<br/></p>
