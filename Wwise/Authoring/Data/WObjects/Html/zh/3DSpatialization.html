
<h2>3D Spatialization</h2>
<p>3D 空间化。指定是否计算音频源定位以便模拟 3D 空间内的运动。根据需要选择以下选项：</p>
<ul>
<li><strong>None</strong>（默认）：声音将依据 Speaker Panning 设置进行摆位。</li>
<li><strong>Position</strong>:声音将依据发声体和听者的相对位置进行摆位。</li>
<li><strong>Position + Orientation</strong>:声音将依据发声体和听者的相对位置进行摆位。同时，声音的多声道内容还会随着发声体和听者的相对朝向旋转。仅当输入文件为多声道且散布大于零时，Orientation 才会起作用。</li>
</ul>
<p>Default value: None<br/></p>
