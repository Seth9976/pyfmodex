
<h2>Bus Volume</h2>
<p>总线音量。Bus 或 Auxiliary Bus 上的音频信号衰减（电平或振幅）。有关音量的详细信息，请参阅 <a href="HelpDoc=understanding_voice_pipeline">理解声部管线</a> 页面。</p>
<p><strong>备注</strong>:默认滑杆范围从 -96 至 +12。您可以通过直接输入数值或在聚焦于编辑控件之上时滑动鼠标来调到限值以上。Bus Volume 设置默认显示 Vertical Fader。若要切换到 Horizontal Slider，请右键单击 Volume 设置并选择 <strong>Use Horizontal Slider for Volume</strong>。</p>
<p>Default value: 0<br/>
Range: -200 to 200<br/>
Units: dB<br/></p>
