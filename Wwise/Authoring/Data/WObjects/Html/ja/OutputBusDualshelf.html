
<h2>Dual-shelf Filter (to Output Bus)</h2>
<p>オーディオ出力バスにルーティングされる信号用のデュアルシェルフフィルタ。</p>
<p>指定したゲインに基づいて高周波を減衰または増加させる、リカーシブ（再帰）フィルタ。</p>
<p><strong>Note</strong>：デフォルトスライダレンジは、-96から+12までとなっている。範囲を広げるには、数値を直接入力するか、編集コントロール部分にカーソルを当てたまま、マウスをスクロールする。</p>
<p>単位：dB<br/></p>
<p>Default value: 0<br/>
Range: -200 to 200<br/>
Units: dB<br/></p>
