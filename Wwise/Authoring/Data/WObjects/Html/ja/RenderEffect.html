
<h2>Render</h2>
<p>選択中のEffectインスタンスを、SoundBankにパッケージングする前にレンダリングするのかどうかを指定する。</p>
<p>Effectのレンダリングを、SoundBankにパッケージングする前に行うことで、ゲームプレイ中の処理負荷を減らせる。However, it also limits the interactivity with game play because an Effect cannot be rendered when Game Syncs control its parameters.</p>
<p>Default value: false<br/></p>
