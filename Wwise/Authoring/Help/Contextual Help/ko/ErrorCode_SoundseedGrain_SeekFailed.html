<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Seek failed due to seeking past end of file.</title><link rel="stylesheet" type="text/css" href="style_ko.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise 콘텍스트 도움말"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Log에서 보고하는 오류"><link rel="prev" href="ErrorCode_SeekAfterEof.html" title="Seeking after end of file Playback will stop."><link rel="next" href="ErrorCode_OpusRequireSeekTable.html" title="Seek table required to seek in Opus sources. Please update conversion settings."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Seek failed due to seeking past end of file.</h4></div></div></div><p>Soundseed Grain 플러그인에 관련된 문제입니다. 플러그인 실행 도중 오류가 발생했습니다. Grain 중 하나가 파일의 끝 부분을 탐색하려고 시도했습니다. Grain이 파기됩니다.</p><div class="itemizedlist"><p class="title"><b>권장 해결 단계:</b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>이 문제가 계속 생길 경우 Audiokinetic 지원팀에 연락해 주세요.</p></li></ul></div></div></body></html>
