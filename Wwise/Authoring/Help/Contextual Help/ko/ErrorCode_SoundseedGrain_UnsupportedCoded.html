<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Unsupported encoding, only PCM, ADPCM, and Vorbis are supported.</title><link rel="stylesheet" type="text/css" href="style_ko.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise 콘텍스트 도움말"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Log에서 보고하는 오류"><link rel="prev" href="ErrorCode_UnloadBankFailed.html" title="Unload bank failed, requested bank was not found."><link rel="next" href="ErrorCode_CannotPlaySource_VirtualOff.html" title="Virtual source failed becoming physical."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Unsupported encoding, only PCM, ADPCM, and Vorbis are supported.</h4></div></div></div><p>Soundseed Grain 플러그인에 관련된 문제입니다. 해당 미디어 파일의 인코딩이 플러그인에 의해 지원되지 않습니다.</p><div class="itemizedlist"><p class="title"><b>권장 해결 단계:</b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>Wwise 프로젝트에서 해당 미디어 파일의 Conversion Settings를 변경하세요.</p></li><li class="listitem"><p>SoundBank를 재생성하세요.</p></li></ul></div></div></body></html>
