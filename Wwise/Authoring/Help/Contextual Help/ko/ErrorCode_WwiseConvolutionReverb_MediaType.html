<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Convolution Reverb media type is not compatible with plug-in. Soundbanks may need to be re-generated due to plug-in version differences, or were generated for the wrong platform.</title><link rel="stylesheet" type="text/css" href="style_ko.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise 콘텍스트 도움말"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Log에서 보고하는 오류"><link rel="prev" href="ErrorCode_NodeNotCompatibleWithMidi.html" title="Container is not compatible with MIDI playback."><link rel="next" href="ErrorCode_WwiseConvolutionReverb_InvalidParameter.html" title="Convolution Reverb plug-in parameters are invalid, effect is disabled."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Convolution Reverb media type is not compatible with plug-in. Soundbanks may need to be re-generated due to plug-in version differences, or were generated for the wrong platform.</h4></div></div></div><p>이 오류는 Impulse Response가 이전 버전의 Wwise를 사용해서 생성되었거나 다른 플랫폼에서 생성되었을 경우 발생합니다.</p><div class="itemizedlist"><p class="title"><b>권장 해결 단계:</b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>SoundBank를 다시 생성하세요.</p></li></ul></div></div></body></html>
