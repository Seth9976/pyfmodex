<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Recorder: Cannot create output file.</title><link rel="stylesheet" type="text/css" href="style_ko.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise 콘텍스트 도움말"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Log에서 보고하는 오류"><link rel="prev" href="ErrorCode_SpatialAudio_SiblingPortal.html" title="Portals cannot connect rooms that are in the same Reverb Zone hierarchy."><link rel="next" href="ErrorCode_AudioDeviceRemoveFailure.html" title="ReplaceOutput could not properly remove old output device."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Recorder: Cannot create output file.</h4></div></div></div><p>Recorder 플러그인과 관련된 문제입니다. 플러그인이 출력 파일을 생성하지 못했습니다.</p><div class="itemizedlist"><p class="title"><b>권장 해결 단계:</b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>Wwise 프로젝트에 제공된 출력 파일 경로를 검토하세요.</p></li><li class="listitem"><p>출력 경로에 작성 권한이 있는지 확인하세요.</p></li><li class="listitem"><p>플러그인 구성에 대한 자세한 내용은 <a class="xref" href="">???</a>을(를) 참고해 주세요.</p></li></ul></div></div></body></html>
