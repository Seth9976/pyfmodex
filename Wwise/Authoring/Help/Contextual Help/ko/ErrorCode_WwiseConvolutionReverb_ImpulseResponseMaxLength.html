<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Maximum Impulse Response length of hardware Convolution Reverb reached.</title><link rel="stylesheet" type="text/css" href="style_ko.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise 콘텍스트 도움말"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Log에서 보고하는 오류"><link rel="prev" href="ErrorCode_MasteringSuite_Unregister.html" title="Mastering Suite: Unable to unregister the ... callback."><link rel="next" href="ErrorCode_HwVoiceLimitReached.html" title="Maximum number of hardware-accelerated voices reached. Voice will not play."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Maximum Impulse Response length of hardware Convolution Reverb reached.</h4></div></div></div><p>AK Convolution Reverb와 관련이 있습니다. 하드웨어 가속이 활성화되었으며 결과적인 Impulse Response 길이가 지원되는 길이를 초과했습니다.</p><div class="itemizedlist"><p class="title"><b>권장 해결 단계:</b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>하드웨어 가속을 비활성화하거나 <code class="code">Reverb, Pre Delay</code> 매개 변수의 값을 조절하세요.</p></li></ul></div></div></body></html>
