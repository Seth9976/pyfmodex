<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>AK::SpatialAudio::SetGeometryInstance or AK::SpatialAudio::SetRoom: 완전히 밀폐되지 않은 지오메트리 인스턴스는 공간 정의에 사용할 수 없습니다..</title><link rel="stylesheet" type="text/css" href="style_ko.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise 콘텍스트 도움말"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Log에서 보고하는 오류"><link rel="prev" href="ErrorCode_SetPortalNonDistinctRoom.html" title="AK::SpatialAudio::SetPortal: Portal must have a front room which is distinct from its back room."><link rel="next" href="ErrorCode_AmbisonicNotAvailable.html" title="Ambisonic is only available with 3D audio. 3D audio is not enabled in the Audio Device, reverting to standard configuration."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">AK::SpatialAudio::SetGeometryInstance or AK::SpatialAudio::SetRoom: 완전히 밀폐되지 않은 지오메트리 인스턴스는 공간 정의에 사용할 수 없습니다..</h4></div></div></div><p>공간 정의에 사용된 지오메트리 인스턴스는 반드시 완전히 밀폐되어야 합니다.</p><div class="itemizedlist"><p class="title"><b>권장 해결 단계:</b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>공간 정의를 사용하기 전에 먼저 지오메트리가 구멍 없이 완전히 밀폐됐는지 확인하세요.</p></li></ul></div></div></body></html>
