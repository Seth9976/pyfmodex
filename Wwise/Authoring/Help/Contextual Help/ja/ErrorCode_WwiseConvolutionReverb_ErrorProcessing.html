<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Error processing convolution effect.</title><link rel="stylesheet" type="text/css" href="style_ja.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise Contextual Help"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Logで報告されるエラー"><link rel="prev" href="ErrorCode_ErrorWhileLoadingBank.html" title="Error while loading bank."><link rel="next" href="ErrorCode_EventIDNotFound.html" title="Event ID not found."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Error processing convolution effect.</h4></div></div></div><p>AK Convolution Reverbに関連します。処理中に予期しないエラーが発生しました。</p><div class="itemizedlist"><p class="title"><b>推奨される解決策: </b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>サウンドバンクとメディアを再生成します。問題が解決しない場合はハードウェアの不具合、ゲームのバグ、Wwise自体が原因である可能性があります。その場合はAudiokinetic Supportにご連絡ください。</p></li></ul></div></div></body></html>
