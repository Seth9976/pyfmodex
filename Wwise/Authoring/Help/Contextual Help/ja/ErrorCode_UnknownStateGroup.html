<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Unknown State Group referenced.</title><link rel="stylesheet" type="text/css" href="style_ja.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise Contextual Help"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Logで報告されるエラー"><link rel="prev" href="ErrorCode_IODevice.html" title="Unknown IO device error. .. returned .. on file ..."><link rel="next" href="ErrorCode_UnloadBankFailed.html" title="Unload bank failed, requested bank was not found."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Unknown State Group referenced.</h4></div></div></div><p>SoundBankに含まれる1つ以上の項目が未知のState Groupを参照します。既知のState GroupはInit.bnkに含まれます。この問題はおそらくInit.bnkが古いことに起因します。</p><p>SoundBankのロードが失敗するのではなく、State Groupが内部で作成され、デフォルトのトランジションタイムとして0秒が採用されます。State Groupは、ロードされたほかのオブジェクトやAPI関数コールが参照する場合があります。</p><div class="itemizedlist"><p class="title"><b>推奨される解決策: </b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>SoundBankを再生成します。</p></li></ul></div></div></body></html>
