<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Seek failed due to seeking past end of file.</title><link rel="stylesheet" type="text/css" href="style_ja.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise Contextual Help"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Logで報告されるエラー"><link rel="prev" href="ErrorCode_SeekAfterEof.html" title="Seeking after end of file. Playback will stop."><link rel="next" href="ErrorCode_OpusRequireSeekTable.html" title="Seek table required to seek in Opus sources. Please update conversion settings."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Seek failed due to seeking past end of file.</h4></div></div></div><p>Soundseed Grainプラグインに関連します。プラグイン実行中にエラーが発生しました。Grainの1つが、ファイルの終わりを過ぎてシークを試行しました。このGrainは破棄されます。</p><div class="itemizedlist"><p class="title"><b>推奨される解決策: </b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>エラーが続く場合は、Audiokineticサポートにご連絡ください。</p></li></ul></div></div></body></html>
