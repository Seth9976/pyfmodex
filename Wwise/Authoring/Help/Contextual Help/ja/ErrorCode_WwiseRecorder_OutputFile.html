<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Recorder: Cannot create output file.</title><link rel="stylesheet" type="text/css" href="style_ja.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise Contextual Help"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Logで報告されるエラー"><link rel="prev" href="ErrorCode_SpatialAudio_SiblingPortal.html" title="Portals cannot connect rooms that are in the same Reverb Zone hierarchy."><link rel="next" href="ErrorCode_AudioDeviceRemoveFailure.html" title="ReplaceOutput could not properly remove old output device."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Recorder: Cannot create output file.</h4></div></div></div><p>Recorderプラグインに関連します。プラグインがアウトプットファイルの作成に失敗しました。</p><div class="itemizedlist"><p class="title"><b>推奨される解決策: </b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>Wwiseプロジェクトで提供されたアウトプットファイルのパスを検証します。</p></li><li class="listitem"><p>アウトプットパスの書き込みが許可されていることを確認します。</p></li><li class="listitem"><p>プラグインコンフィギュレーションの詳細については<a class="xref" href="">???</a>をご参照ください。</p></li></ul></div></div></body></html>
