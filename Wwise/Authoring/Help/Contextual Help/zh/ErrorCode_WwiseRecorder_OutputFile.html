<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Recorder: Cannot create output file.</title><link rel="stylesheet" type="text/css" href="style.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise Contextual Help"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Log 中报告的错误"><link rel="prev" href="ErrorCode_SpatialAudio_SiblingPortal.html" title="Portals cannot connect rooms that are in the same Reverb Zone hierarchy."><link rel="next" href="ErrorCode_AudioDeviceRemoveFailure.html" title="ReplaceOutput could not properly remove old output device."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Recorder: Cannot create output file.</h4></div></div></div><p>“Recorder: 无法创建输出文件。”与 Recorder 插件相关。插件无法创建输出文件。</p><div class="itemizedlist"><p class="title"><b>推荐的解决步骤：</b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>确认 Wwise 工程中提供的输出文件路径。</p></li><li class="listitem"><p>确保输出路径具备写入权限。</p></li><li class="listitem"><p>有关插件配置的更多详细信息，请参阅 <a class="xref" href="">???</a>。</p></li></ul></div></div></body></html>
