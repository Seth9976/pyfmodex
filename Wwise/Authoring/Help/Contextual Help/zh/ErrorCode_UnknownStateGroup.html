<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Unknown State Group referenced.</title><link rel="stylesheet" type="text/css" href="style.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise Contextual Help"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Log 中报告的错误"><link rel="prev" href="ErrorCode_IODevice.html" title="Unknown IO device error. .. returned .. on file ..."><link rel="next" href="ErrorCode_UnloadBankFailed.html" title="Unload bank failed, requested bank was not found."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Unknown State Group referenced.</h4></div></div></div><p>“引用了未知的状态组。”SoundBank（音频包）中所含的一个或多个条目引用了未知的 State Group（状态组）。已知的 State Group 包含在 Init.bnk 中。此问题很可能是因为没有更新 Init.bnk 导致的。</p><p>Soundbank 加载并不会失败，但会将默认过渡时间设为 0s 并在内部创建 State Group。其他一些加载的对象以及 API 函数调用都可引用 State Group。</p><div class="itemizedlist"><p class="title"><b>推荐的解决步骤：</b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>重新生成 SoundBank（音频包）。</p></li></ul></div></div></body></html>
