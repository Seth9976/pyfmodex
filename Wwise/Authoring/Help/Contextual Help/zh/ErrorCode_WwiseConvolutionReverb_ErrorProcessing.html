<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Error processing convolution effect.</title><link rel="stylesheet" type="text/css" href="style.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise Contextual Help"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Log 中报告的错误"><link rel="prev" href="ErrorCode_ErrorWhileLoadingBank.html" title="Error while loading bank."><link rel="next" href="ErrorCode_EventIDNotFound.html" title="Event ID not found."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Error processing convolution effect.</h4></div></div></div><p>“使用了与 Sound Engine 运行时条件不匹配的 Convolution Reverb 参数生成音频包。将无法听到‪湿声路径的音频信号。”与 AK Convolution Reverb 相关。在处理时出现异常错误。</p><div class="itemizedlist"><p class="title"><b>推荐的解决步骤：</b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>重新生成 SoundBank 和媒体。若问题依然存在，则表示可能硬件发生了故障、游戏存在漏洞或 Wwise 本身出现了问题。在这种情况下，请联系 Audiokinetic 技术支持部门。</p></li></ul></div></div></body></html>
