<html><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><title>Maximum Impulse Response length of hardware Convolution Reverb reached.</title><link rel="stylesheet" type="text/css" href="style.css"><meta name="generator" content="DocBook XSL Stylesheets V1.79.2"><link rel="home" href="index.html" title="Wwise Contextual Help"><link rel="up" href="common_errors_reported_in_capture_log.html" title="Capture Log 中报告的错误"><link rel="prev" href="ErrorCode_MasteringSuite_Unregister.html" title="Mastering Suite: Unable to unregister the ... callback."><link rel="next" href="ErrorCode_HwVoiceLimitReached.html" title="Maximum number of hardware-accelerated voices reached. Voice will not play."></head><body bgcolor="white" text="black" link="#0000FF" vlink="#840084" alink="#0000FF"><div class="sect3"><div class="titlepage"><div><div><h4 class="title">Maximum Impulse Response length of hardware Convolution Reverb reached.</h4></div></div></div><p>“使用了与 Sound Engine 运行时条件不匹配的 Convolution Reverb 参数生成音频包。将无法听到‪湿声路径的音频信号。”与 AK Convolution Reverb 相关。启用了硬件加速，最终的 Impulse Response 长度大于支持的长度。</p><div class="itemizedlist"><p class="title"><b>推荐的解决步骤：</b></p><ul class="itemizedlist" style="list-style-type: disc; "><li class="listitem"><p>禁用硬件加速或调节 <code class="code">Reverb, Pre Delay</code>（Reverb 预延迟）参数的值。</p></li></ul></div></div></body></html>
